<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-i18n="opts_title">SkipAds Settings</title>
<style>
:root {
  --bg-color: #f5f5f5;
  --text-color: #222;
  --card-bg: #fff;
  --border-color: #eee;
  --desc-color: #666;
  --input-border: #ccc;
  --input-bg: #fff;
  --btn-clear-bg: #eee;
  --stat-color: #AB5A5A;
  --status-bg: #d4edda;
  --status-color: #155724;
  --shadow: rgba(0,0,0,.1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-color: #1a1a1a;
    --text-color: #e0e0e0;
    --card-bg: #252525;
    --border-color: #3a3a3a;
    --desc-color: #aaa;
    --input-border: #444;
    --input-bg: #2d2d2d;
    --btn-clear-bg: #3a3a3a;
    --stat-color: #d48a8a;
    --status-bg: #2d4a2d;
    --status-color: #a8e6a8;
    --shadow: rgba(0,0,0,.3);
  }
}
html[data-theme="light"] {
  --bg-color: #f5f5f5;
  --text-color: #222;
  --card-bg: #fff;
  --border-color: #eee;
  --desc-color: #666;
  --input-border: #ccc;
  --input-bg: #fff;
  --btn-clear-bg: #eee;
  --stat-color: #AB5A5A;
  --status-bg: #d4edda;
  --status-color: #155724;
  --shadow: rgba(0,0,0,.1);
}
html[data-theme="dark"] {
  --bg-color: #1a1a1a;
  --text-color: #e0e0e0;
  --card-bg: #252525;
  --border-color: #3a3a3a;
  --desc-color: #aaa;
  --input-border: #444;
  --input-bg: #2d2d2d;
  --btn-clear-bg: #3a3a3a;
  --stat-color: #d48a8a;
  --status-bg: #2d4a2d;
  --status-color: #a8e6a8;
  --shadow: rgba(0,0,0,.3);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:960px;margin:40px auto;padding:0 32px;background:var(--bg-color);color:var(--text-color)}
h1{font-size:24px}
.card{background:var(--card-bg);border-radius:10px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 6px var(--shadow)}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:center}
.card-grid .row{border-top:1px solid var(--border-color);padding:12px 10px;display:flex;justify-content:space-between;align-items:center;min-width:0}
.card-grid .row:nth-child(-n+2){border-top:none}
.card-grid .row:nth-child(odd){border-right:1px solid var(--border-color);padding-right:14px}
.card-grid .row:nth-child(even){padding-left:14px}
@media(max-width:639px){.card-grid{grid-template-columns:1fr}
.card-grid .row{padding:10px 0}
.card-grid .row:nth-child(-n+2){border-top:1px solid var(--border-color)}
.card-grid .row:nth-child(odd){border-right:none;padding-right:0}
.card-grid .row:first-child{border-top:none}
}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.row+.row{border-top:1px solid var(--border-color)}
.desc{font-size:13px;color:var(--desc-color);margin-top:3px}
select{padding:6px 10px;border:1px solid var(--input-border);border-radius:6px;font-size:15px;background:var(--input-bg);color:var(--text-color)}
input[type=checkbox]{width:20px;height:20px;accent-color:#AB5A5A}
#save{width:100%;padding:12px;background:#AB5A5A;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#save:hover{background:#944a4a}
#status{margin-top:12px;padding:10px;border-radius:6px;text-align:center;font-size:14px;display:none}
#status.ok{display:block;background:var(--status-bg);color:var(--status-color)}
#btn_clearStats{background:var(--btn-clear-bg);color:var(--text-color)}
#stat_totalSkips,#stat_timeSaved,#stat_avgDuration,#stat_fpTotalSeen{color:var(--stat-color);font-size:16px}
#statsHistory,#fpStatsHistory{color:var(--desc-color)}
</style>
</head>
<body>
<h1 id="title"></h1>
<div class="card card-grid">
  <div class="row">
    <div><label id="lbl_speed"></label><div class="desc" id="desc_speed"></div></div>
    <select id="speed">
      <option value="2" selected>2x</option><option value="4">4x</option>
      <option value="8">8x</option><option value="16">16x</option>
    </select>
  </div>
  <div class="row">
    <div><label id="lbl_mute"></label><div class="desc" id="desc_mute"></div></div>
    <input type="checkbox" id="muteAd" checked>
  </div>
  <div class="row">
    <div><label id="lbl_toast"></label><div class="desc" id="desc_toast"></div></div>
    <input type="checkbox" id="showNotification" checked>
  </div>
  <div class="row">
    <div><label id="lbl_blockAds"></label><div class="desc" id="desc_blockAds"></div></div>
    <input type="checkbox" id="blockHomeAds" checked>
  </div>
  <div class="row">
    <div><label id="lbl_incremental"></label><div class="desc" id="desc_incremental"></div></div>
    <input type="checkbox" id="incrementalSpeed">
  </div>
  <div class="row">
    <div><label id="lbl_collapsePanel"></label><div class="desc" id="desc_collapsePanel"></div></div>
    <input type="checkbox" id="collapsePanelAds" checked>
  </div>
  <div class="row">
    <div><label id="lbl_collapseCd"></label><div class="desc" id="desc_collapseCd"></div></div>
    <select id="collapseCooldown">
      <option id="collapseCooldown5" value="5">5s</option>
      <option id="collapseCooldown10" value="10">10s</option>
      <option id="collapseCooldown15" value="15" selected>15s</option>
      <option id="collapseCooldown30" value="30">30s</option>
      <option id="collapseCooldown60" value="60">60s</option>
      <option id="collapseCooldown0" value="0">No pause</option>
    </select>
  </div>
  <div class="row">
    <div><label id="lbl_hideFeaturedProduct"></label><div class="desc" id="desc_hideFeaturedProduct"></div></div>
    <input type="checkbox" id="hideFeaturedProduct" checked>
  </div>
  <div class="row">
    <div><label id="lbl_hideChat"></label><div class="desc" id="desc_hideChat"></div></div>
    <input type="checkbox" id="hideChat">
  </div>
  <div class="row">
    <div><label id="lbl_hideChatCd"></label><div class="desc" id="desc_hideChatCd"></div></div>
    <select id="hideChatCooldown">
      <option id="hideChatCooldown5" value="5">5s</option>
      <option id="hideChatCooldown10" value="10">10s</option>
      <option id="hideChatCooldown30" value="30">30s</option>
      <option id="hideChatCooldown60" value="60">1m</option>
      <option id="hideChatCooldown0" value="0" selected>Never resume</option>
    </select>
  </div>
  <div class="row">
    <div><label id="lbl_debug"></label><div class="desc" id="desc_debug"></div></div>
    <input type="checkbox" id="debugMode">
  </div>
  <div class="row">
    <div><label id="lbl_skipBtnClick"></label><div class="desc" id="desc_skipBtnClick"></div></div>
    <input type="checkbox" id="skipBtnClick">
  </div>
  <div class="row">
    <div><label id="lbl_enabled"></label><div class="desc" id="desc_enabled"></div></div>
    <input type="checkbox" id="enabled" checked>
  </div>
  <div class="row">
    <div><label id="lbl_theme"></label><div class="desc" id="desc_theme"></div></div>
    <select id="theme">
      <option id="themeSystem" value="system">System</option>
      <option id="themeLight" value="light">Light</option>
      <option id="themeDark" value="dark">Dark</option>
    </select>
  </div>
</div>
<div class="card">
  <h2 id="lbl_statsTitle" style="margin-top:0;margin-bottom:12px;font-size:16px"></h2>
  <div class="row">
    <div><label id="lbl_statsTotalSkips"></label></div>
    <div id="stat_totalSkips" style="font-weight:600">0</div>
  </div>
  <div class="row">
    <div><label id="lbl_statsTimeSaved"></label></div>
    <div id="stat_timeSaved" style="font-weight:600">0s</div>
  </div>
  <div class="row">
    <div><label id="lbl_statsAvgAdDuration"></label></div>
    <div id="stat_avgDuration" style="font-weight:600">0s</div>
  </div>
  <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-color)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <label id="lbl_statsHistoryTitle" style="font-weight:600"></label>
      <button id="btn_clearStats" style="font-size:12px;padding:4px 8px;border:none;border-radius:4px;cursor:pointer"></button>
    </div>
    <div id="statsHistory" style="max-height:200px;overflow-y:auto;font-size:12px"></div>
  </div>
</div>
<div class="card">
  <h2 id="lbl_fpStatsTitle" style="margin-top:0;margin-bottom:12px;font-size:16px"></h2>
  <div class="row">
    <div><label id="lbl_fpStatsTotalSeen"></label></div>
    <div id="stat_fpTotalSeen" style="font-weight:600;color:var(--stat-color)">0</div>
  </div>
  <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-color)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <label id="lbl_fpStatsHistoryTitle" style="font-weight:600"></label>
      <button id="btn_clearFpStats" style="font-size:12px;padding:4px 8px;border:none;border-radius:4px;cursor:pointer"></button>
    </div>
    <div id="fpStatsHistory" style="max-height:200px;overflow-y:auto;font-size:12px"></div>
  </div>
</div>
<button id="save"></button>
<div id="status"></div>
<script src="options.js"></script>
</body>
</html>
